<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1 class="game-title">Tic-Tac-Toe</h1>
    <div class="game-container">
        <div class="game">
            <div class="pos-0" id="0"></div>
            <div class="pos-1" id="1"></div>
            <div class="pos-2" id="2"></div>
            <div class="pos-3" id="3"></div>
            <div class="pos-4" id="4"></div>
            <div class="pos-5" id="5"></div>
            <div class="pos-6" id="6"></div>
            <div class="pos-7" id="7"></div>
            <div class="pos-8" id="8"></div>
        </div>
    </div>
    <div class="options">
        <label for="player1-name">PLAYER 1 (X):</label>
        <input id="player1-name" name="player1-name"type="text">

        <label for="player2-name">PLAYER 2 (O):</label>
        <input id="player2-name" name="player2-name"type="text">

        <button class="restart" id="restart">RESTART</button>
        <button class="start" id="start">START</button>
    </div>
</body>
</html>
